server:
  port: 0

spring:
  application:
    name: collector

  config:
    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: true
      retry:
        max-attempts: 20
        max-interval: 3000
        initial-interval: 1000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}  # ← УБРАЛ :kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL}  # ← УБРАЛ :http://schema-registry:8081
        request.timeout.ms: 60000
        retry.backoff.ms: 500
        reconnect.backoff.ms: 500
        reconnect.backoff.max.ms: 1000
    listener:
      missing-topics-fatal: false
    template:
      default-topic: stats.user-actions.v1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      grpcPort: ${GRPC_PORT:9091}

grpc:
  server:
    port: ${GRPC_PORT:9091}

kafka:
  topics:
    user-actions: stats.user-actions.v1

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: DEBUG
    org.apache.kafka.clients: DEBUG