syntax = "proto3";

package ru.practicum.ewm.stats.proto;  // ← ИЗМЕНИТЬ

option java_package = "ru.practicum.ewm.stats.proto";  // ← ИЗМЕНИТЬ
option java_outer_classname = "RecommendationsProto";
option java_multiple_files = true;

// Запрос рекомендаций для пользователя
message UserPredictionsRequest {
  int64 user_id = 1;
  int32 max_results = 2;
}

// Запрос похожих мероприятий
message SimilarEventsRequest {
  int64 event_id = 1;
  int64 user_id = 2;
  int32 max_results = 3;
}

// Запрос суммы взаимодействий
message InteractionsCountRequest {
  repeated int64 event_ids = 1;
}

// Рекомендованное мероприятие
message RecommendedEvent {
  int64 event_id = 1;
  double score = 2;
}

// gRPC сервис для получения рекомендаций
service RecommendationsController {
  rpc GetRecommendationsForUser(UserPredictionsRequest) returns (stream RecommendedEvent);
  rpc GetSimilarEvents(SimilarEventsRequest) returns (stream RecommendedEvent);
  rpc GetInteractionsCount(InteractionsCountRequest) returns (stream RecommendedEvent);
}