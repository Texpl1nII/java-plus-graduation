syntax = "proto3";

package stats.service.collector;  // ← ИЗМЕНИТЬ на это

import "google/protobuf/timestamp.proto";

option java_package = "ru.practicum.stats.proto";  // ← ИЗМЕНИТЬ на это
option java_outer_classname = "UserActionProto";
option java_multiple_files = true;

// Тип действия пользователя
enum ActionTypeProto {
  ACTION_VIEW = 0;
  ACTION_REGISTER = 1;
  ACTION_LIKE = 2;
}

// Сообщение о действии пользователя
message UserActionMessage {
  int64 user_id = 1;
  int64 event_id = 2;
  ActionTypeProto action_type = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// Пустой ответ
message EmptyResponse {}

// gRPC сервис для сбора действий пользователей
service UserActionController {
  rpc CollectUserAction(UserActionMessage) returns (EmptyResponse);
}