spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/categories/**,/admin/categories/**
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/events/**,/admin/events/**,/users/*/events/**
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**,/users/*/events/*/requests/**
        - id: compilation-service
          uri: lb://compilation-service
          predicates:
            - Path=/compilations/**,/admin/compilations/**
        - id: stats-server
          uri: lb://stats-server
          predicates:
            - Path=/stat/**
          filters:
            - RewritePath=/stat/(?<remaining>.*), /${remaining}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/