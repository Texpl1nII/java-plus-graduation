spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${CATEGORY_DB_URL:jdbc:postgresql://category-db:5432/category}
    username: ${CATEGORY_DB_USER:postgres}
    password: ${CATEGORY_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

server:
  port: 0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true