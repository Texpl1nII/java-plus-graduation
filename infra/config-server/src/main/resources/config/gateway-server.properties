spring.application.name=gateway-server
server.port=8080

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=main-service
spring.cloud.gateway.routes[0].uri=lb://main-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/**

spring.cloud.gateway.routes[1].id=stat-server
spring.cloud.gateway.routes[1].uri=lb://stat-server
spring.cloud.gateway.routes[1].predicates[0]=Path=/stat/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/stat/(?<remaining>.*), /${remaining}