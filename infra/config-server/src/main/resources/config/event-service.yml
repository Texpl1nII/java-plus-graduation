spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ewm_event
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  application:
    name: event-service

  # Настройки для Config Server
  config:
    import: "optional:configserver:http://config-server:8888"

  cloud:
    config:
      discovery:
        enabled: false

server:
  port: 0  # случайный порт для gRPC и HTTP

# Настройки Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Настройки Feign
feign:
  httpclient:
    enabled: false
  hc5:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# НОВОЕ: Настройки gRPC клиентов
grpc:
  client:
    collector-service:
      address: 'discovery:///collector-service'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
    analyzer-service:
      address: 'discovery:///analyzer-service'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
  server:
    port: 0  # случайный порт для gRPC сервера (если нужен)

# Настройки логирования
logging:
  level:
    ru.practicum: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.web: INFO
    io.grpc: DEBUG
    net.devh.boot.grpc: DEBUG