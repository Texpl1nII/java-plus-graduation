spring:
  application:
    name: gateway-server
  config:
    import: "configserver:http://localhost:8888"  # ← ЯВНО УКАЗАТЬ URL
  cloud:
    config:
      fail-fast: true
      discovery:
        enabled: false
        service-id: config-server
      retry:
        useRandomPolicy: true
        max-interval: 6000

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    instance-id: ${spring.application.name}:${random.value}