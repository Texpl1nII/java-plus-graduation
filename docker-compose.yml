services:
  discovery-server:
    build: ./infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - app-network

  config-server:
    build: ./infra/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
    networks:
      - app-network

  gateway-server:
    build: ./infra/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
    networks:
      - app-network

  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "6642:5432"
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  stats-server:
    build: stats/stats-server
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      - DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - DATASOURCE_USERNAME=stats
      - DATASOURCE_PASSWORD=stats
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
    networks:
      - app-network

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    ports:
      - "6543:5432"
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ewm" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ewm-service:
    build: ./core/main-service
    container_name: ewm-service
    ports:
      - "8081:8080"
    depends_on:
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      - DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - DATASOURCE_USERNAME=ewm
      - DATASOURCE_PASSWORD=ewm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
    networks:
      - app-network

networks:
  app-network:
    driver: bridge