services:
  discovery-server:
    build: ./infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  config-server:
    build: ./infra/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    restart: on-failure
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=classpath:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  gateway-server:
    build: ./infra/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # Статистика
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "6642:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stats"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  stats-server:
    build: ./stats/stats-server
    container_name: stats-server
    ports:
      - "9090:9090"
    restart: on-failure
    depends_on:
      stats-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED=false
    networks:
      - app-network

  # БД для микросервисов
  user-db:
    image: postgres:16.1
    container_name: user-db
    ports:
      - "5433:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  category-db:
    image: postgres:16.1
    container_name: category-db
    ports:
      - "5434:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: category
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d category"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  event-db:
    image: postgres:16.1
    container_name: event-db
    ports:
      - "5435:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  request-db:
    image: postgres:16.1
    container_name: request-db
    ports:
      - "5436:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: request
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d request"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - app-network

  compilation-db:
    image: postgres:16.1
    container_name: compilation-db
    ports:
      - "5437:5432"
    restart: on-failure
    environment:
      POSTGRES_DB: compilation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compilation"]
      interval: 5s
